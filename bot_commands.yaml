# ─── Special Commands (Python handlers) ───
# Metadata only — the actual handlers live in botpkg/handlers/*.py.
# Descriptions, aliases, and follow-ups are loaded from here at startup.
_special:
  help:
    desc: "Show this help message"
  status:
    desc: "Bot status: uptime, heartbeat config"
  screenshot:
    desc: "Capture screenshot: /screenshot [count] or /screenshot stop"
    aliases: [ss, snap, sc]
    followups:
      - { label: "📸 Another", cmd: "/screenshot" }
      - { label: "🔍 Diff", cmd: "/diff" }
      - { label: "📹 Record", cmd: "/record" }
  webcam:
    desc: "Webcam photo: /webcam [count]"
    followups:
      - { label: "📷 Another", cmd: "/webcam" }
      - { label: "📹 Record", cmd: "/webcamrecord" }
  key:
    desc: "Send keys: /key cmd l, /key enter, /key alt shift 3"
    aliases: [k]
  type:
    desc: "Type text: /type <text>"
  url:
    desc: "Open URL in browser: /url <url>"
  logs:
    desc: "Show bot logs: /logs [lines]"
  kill:
    desc: "Kill process: /kill <name>"
  restartbot:
    desc: "Restart the bot process"
  remind:
    desc: "Set reminder: /remind <duration> <message> (e.g. 5m, 2h, 90s)"
    aliases: [r]
  open:
    desc: "Open an app: /open <app_name>"
  quit:
    desc: "Quit an app: /quit <app_name>"
  say:
    desc: "Speak text aloud: /say <text>"
  voices:
    desc: "List available macOS voices"
    aliases: [v]
  keyboard:
    desc: "Show quick reply keyboard"
    aliases: [kb]
  download:
    desc: "Send file from Mac: /download <path>"
    aliases: [dl]
  upload:
    desc: "Save next file sent to: /upload [path]"
    aliases: [ul]
  notifications:
    desc: "Recent macOS notifications: /notifications [count]"
    aliases: [notifs]
  note:
    desc: "Notes: /note save|list|search|delete <text|id>"
    aliases: [n]
    followups:
      - { label: "📝 List", cmd: "/note list" }
      - { label: "🔍 Search", cmd: "/note search " }
  record:
    desc: "Record screen: /record <duration> (e.g. 10s, 1m)"
    aliases: [rec]
    followups:
      - { label: "📸 Screenshot", cmd: "/screenshot" }
      - { label: "🔍 Diff", cmd: "/diff" }
  audio:
    desc: "Record audio: /audio <duration> (e.g. 10s, 1m)"
    aliases: [mic]
  webcamrecord:
    desc: "Record webcam video: /webcamrecord <duration> (e.g. 10s, 1m)"
    aliases: [wcr]
  macro:
    desc: "Run a macro: /macro <name>"
  macros:
    desc: "List available macros"
  brain:
    desc: "NLP brain: /brain status|clear"
  calendar:
    desc: "Calendar: /calendar [today|tomorrow|week|add <text>]"
    aliases: [cal, today]
    followups:
      - { label: "✉️ Mail", cmd: "/mail" }
      - { label: "📝 Note", cmd: "/note save " }
  mail:
    desc: "Email: /mail [count|search <q>|read <id>|send <to> <msg>]"
    aliases: [email, gmail]
    followups:
      - { label: "📅 Calendar", cmd: "/calendar" }
      - { label: "📝 Note", cmd: "/note save " }
  googlesetup:
    desc: "Set up Google Calendar & Gmail API"
  last:
    desc: "Show recent commands: /last [count]"
    aliases: [l, history]
  diff:
    desc: "Screenshot comparison: highlights what changed since last /diff"
    aliases: [compare, changed]
    followups:
      - { label: "📸 Screenshot", cmd: "/screenshot" }
  where:
    desc: "Network context: public IP, WiFi, geolocation, signal"
    aliases: [network, ip, wifi]
    followups:
      - { label: "📊 Status", cmd: "/status" }
      - { label: "📸 Screenshot", cmd: "/screenshot" }
  timer:
    desc: "Countdown timer: /timer <duration> [label]"
    aliases: [countdown]
    followups:
      - { label: "🍅 Pomodoro", cmd: "/pomodoro" }
      - { label: "🎯 Focus", cmd: "/focus 25m" }
  pomodoro:
    desc: "Pomodoro timer: 25m work → 5m break"
    aliases: [pomo]
    followups:
      - { label: "🎯 Focus", cmd: "/focus 25m" }
      - { label: "⏱ Timer", cmd: "/timer 25m" }
  snippet:
    desc: "Clipboard history: /snippet [N|search|clear]"
