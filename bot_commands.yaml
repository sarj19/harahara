    aliases: [onboard, tour, welcome]
  menu:
    desc: "Quick-access category keyboards: /menu [category]"
    aliases: [categories, commands]
  focus:
    desc: "Focus mode: timer + DND: /focus <duration> [label]"
    aliases: [dnd, deepwork]
  pin:
    desc: "Bookmark a message: reply with /pin or /pin <text>"
    aliases: [bookmark, save]
  pins:
    desc: "List pinned messages: /pins [clear]"
    aliases: [bookmarks, saved]
  streak:
    desc: "Your usage streak and stats"
    aliases: [stats, gamify]
  fav:
    desc: "Favorites bar: /fav add|remove|list|show"
  settings:
    desc: "Interactive settings wizard"
  setup:
    desc: "macOS permissions walkthrough & tips"
  shortcut:
    desc: "Run macOS Shortcut: /shortcut [name]"
    aliases: [shortcuts]
    followups:
      - { label: "📎 List", cmd: "/shortcut list" }
  schedule:
    desc: "Manage schedules: /schedule [list|add|remove]"
    aliases: [sched, schedules]
    followups:
      - { label: "📎 List", cmd: "/schedule list" }
      - { label: "🔨 Build", cmd: "/build" }
  ollamasetup:
    desc: "Set up local AI with Ollama"
  ai:
    desc: "AI query: /ai <question> (uses configured backend)"
    aliases: [ask, llm, ollama]
    followups:
      - { label: "🤖 Setup", cmd: "/ollamasetup" }
      - { label: "🧠 Brain", cmd: "/brain status" }
  exec:
    desc: "Run shell command: /exec <command>"
    aliases: [run, sh, shell, bash, zsh]


# ─── System Control ───
ping:
  cmd: "echo '🖥 System Status' && uptime && echo '' && top -l 1 -n 0 | grep -E '^(CPU|Phys)' && echo '' && df -h / | awk 'NR==2{printf \"Disk: %s used of %s (%s)\\n\", $3, $2, $5}' && echo '' && echo \"IP: $(ipconfig getifaddr en0 2>/dev/null || echo 'N/A')\" && echo \"Battery: $(pmset -g batt | grep -Eo '\\d+%' | head -1 || echo 'N/A')\""
  desc: System status (uptime, CPU, memory, disk, IP, battery)
  aliases: [p, sysinfo]
  followups:
    - { label: "📸 Screenshot", cmd: "/screenshot" }
    - { label: "📊 Dashboard", cmd: "/status" }

uptime:
  cmd: "uptime"
  desc: Show system uptime

pid:
  cmd: "ps -p {} -o pid,ppid,stat,%cpu,%mem,etime,command"
  desc: "Show process status by PID: /pid <pid>"

lock:
  cmd: "pmset displaysleepnow"
  desc: Put the display to sleep
  followups:
    - { label: "🔓 Wake", cmd: "/wake" }

wake:
  cmd: "caffeinate -u -t 1"
  desc: Wake the display

stayawake:
  cmd: "caffeinate -di & echo $! > /tmp/harahara_bot_caffeinate.pid && echo \"Computer will stay awake (PID: $(cat /tmp/harahara_bot_caffeinate.pid)). Use /stopawake to stop.\""
  desc: Keep the Mac awake indefinitely

stopawake:
  cmd: "if [ -f /tmp/harahara_bot_caffeinate.pid ]; then kill $(cat /tmp/harahara_bot_caffeinate.pid) 2>/dev/null && rm /tmp/harahara_bot_caffeinate.pid && echo 'Stopped.'; else killall caffeinate 2>/dev/null && echo 'Stopped (killall).'; fi || echo 'No active caffeinate process.'"
  desc: Stop keeping the Mac awake

restart:
  cmd: "osascript -e 'tell app \"System Events\" to restart'"
  desc: "⚠️ Restart the computer (requires confirmation)"

shutdown:
  cmd: "osascript -e 'tell app \"System Events\" to shut down'"
  desc: "⚠️ Shut down the computer (requires confirmation)"

procs:
  cmd: "bash -c 'N=${1:-10}; ps aux -r | head -$((N+1))' --"
  desc: "Top processes by CPU: /procs [count] (default 10)"

apps:
  cmd: "osascript -e 'tell application \"System Events\" to get name of every process whose background only is false' | tr ',' '\\n' | sed 's/^ //'"
  desc: "List running GUI applications"
  aliases: [app, running]
  followups:
    - { label: "💀 Kill", cmd: "/kill " }
    - { label: "❌ Quit", cmd: "/quit " }

frontapp:
  cmd: "osascript -e 'tell application \"System Events\" to get name of first process whose frontmost is true'"
  desc: "Show the frontmost application"
  aliases: [front, activeapp]

# ─── Clipboard ───
clipboard:
  cmd: "pbpaste"
  desc: Show clipboard contents

setclipboard:
  cmd: "printf '%s' {} | pbcopy"
  desc: "Set clipboard text: /setclipboard <text>"

# ─── Volume & Audio ───
volume:
  cmd: "osascript -e 'output volume of (get volume settings)'"
  desc: Get current volume (0-100)
  aliases: [vol]

setvolume:
  cmd: "osascript -e 'set volume output volume {}'"
  desc: "Set volume: /setvolume <0-100>"
  aliases: [sv]

mute:
  cmd: "osascript -e 'set volume output muted true' && echo '🔇 Muted.'"
  desc: Mute audio

unmute:
  cmd: "osascript -e 'set volume output muted false' && echo '🔊 Unmuted.'"
  desc: Unmute audio

# ─── Notifications ───
notify:
  cmd: "osascript -e 'display notification \"{}\" with title \"harahara Bot\"' && echo 'Notification sent.'"
  desc: "Show a macOS notification: /notify <message>"

# ─── Network ───
publicip:
  cmd: "curl -s ifconfig.me"
  desc: Show public IP address

# ─── Cleanup ───
trash:
  cmd: "osascript -e 'tell app \"Finder\" to empty trash' && echo 'Trash emptied.'"
  desc: "⚠️ Empty the Trash (requires confirmation)"

tempclean:
  cmd: "rm -rf /tmp/harahara_bot_* && echo 'Temp files cleaned.'"
  desc: Clean bot temp files

# ─── Dev & Automation ───
gemini:
  cmd: "NODE_NO_WARNINGS=1 gemini --yolo --output-format text 'Be concise. {}'"
  desc: "Run Gemini CLI: /gemini <query>"
  timeout: 300

cron:
  cmd: "crontab -l 2>/dev/null || echo 'No crontab set.'"
  desc: Show cron jobs
