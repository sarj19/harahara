name: Auto PR

on:
  push:
    branches-ignore:
      - main
      - master

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    if: github.actor == 'sarj19'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          BRANCH="${GITHUB_REF_NAME}"
          EXISTING=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH — skipping."
          else
            gh pr create \
              --title "$(git log -1 --format='%s')" \
              --body "Auto-generated PR for branch \`$BRANCH\`.

          $(git log -1 --format='%b')" \
              --base main \
              --head "$BRANCH"
            echo "PR created for branch $BRANCH"

            # Auto-merge (waits for required checks to pass first)
            gh pr merge "$BRANCH" --squash --auto --delete-branch
            echo "Auto-merge enabled for branch $BRANCH"
          fi
